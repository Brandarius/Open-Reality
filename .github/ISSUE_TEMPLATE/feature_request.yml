name: Feature Request
description: Suggest a new feature or improvement for OpenReality
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve OpenReality? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Engine Area
      description: Which part of the engine does this relate to?
      multiple: true
      options:
        - ECS / Core
        - Rendering / Shaders
        - Physics
        - Audio
        - Animation / Skinning
        - UI / HUD
        - Asset Loading (glTF, OBJ)
        - Windowing / Input
        - Backend (OpenGL)
        - Backend (Vulkan)
        - Backend (Metal)
        - Backend (WebGPU)
        - CLI Tooling
        - Documentation
        - Testing
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, references, or code snippets.
    validations:
      required: false

name: Question
description: Ask a question about using or understanding OpenReality
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about OpenReality? Check the
        [documentation](https://github.com/sinisterMage/Open-Reality/tree/main/docs)
        first — your answer might already be there!

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to accomplish? Any relevant code or setup details.
    validations:
      required: false

  - type: textarea
    id: tried
    attributes:
      label: What You've Tried
      description: Describe any approaches you've already attempted.
    validations:
      required: false
